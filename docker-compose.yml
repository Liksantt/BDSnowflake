version: '3'

services:
  postgres:
    image: postgres:15
    container_name: bigdata_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bigdata
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - C:/BDSnowflake/scripts:/docker-entrypoint-initdb.d
      - C:/BDSnowflake/исходные данные:/data

volumes:
  pgdata: